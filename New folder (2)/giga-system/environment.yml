# =============================================================================
# GIGA SYSTEM - Conda Environment
# Complete environment with Python + R integration
# =============================================================================

name: giga-system
channels:
  - conda-forge
  - defaults
  - r

dependencies:
  # Python Base
  - python=3.11
  - pip
  
  # R Base
  - r-base=4.3
  - r-essentials
  
  # Core Python Packages (via conda for better compatibility)
  - numpy=1.26.2
  - scipy=1.11.4
  - numba=0.58.1
  - sympy=1.12
  
  # Data Processing
  - polars=0.19.19
  - duckdb=0.9.2
  - pyarrow=14.0.1
  
  # Visualization
  - plotly=5.18.0
  
  # R Packages (via conda-forge)
  - r-forecast
  - r-rugarch
  - r-vars
  - r-urca
  - r-performanceanalytics
  - r-quantmod
  - r-ttr
  - r-mass
  - r-copula
  - r-evd
  - r-portfolioanalytics
  - r-ggplot2
  - r-plotly
  - r-depmixs4
  
  # Pip installations (packages not in conda)
  - pip:
    - QuantLib==1.32
    - qiskit==0.45.1
    - qiskit-aer==0.13.1
    - qiskit-optimization==0.6.0
    - vectorbt==0.26.0
    - rpy2==3.5.15
    - streamlit==1.29.0
    - toml==0.10.2
    - loguru==0.7.2
    - pytest==7.4.3
    - pytest-benchmark==4.0.0

# =============================================================================
# Usage:
#   conda env create -f environment.yml
#   conda activate giga-system
# =============================================================================
